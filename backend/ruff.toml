# Ruff配置文件
# 快速Python代码检查工具

# 目标Python版本
target-version = "py311"

# 每行最大长度
line-length = 100

# 启用的规则集
select = [
    "E",   # pycodestyle错误
    "W",   # pycodestyle警告
    "F",   # Pyflakes
    "I",   # isort
    "N",   # pep8-naming
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "SIM", # flake8-simplify
    "TCH", # flake8-type-checking
]

# 忽略的规则
ignore = [
    "E501",   # 行过长（与black冲突）
    "B008",   # 函数调用中的默认参数
    "C901",   # 复杂度
    "SIM108", # 不鼓励使用三元表达式
]

# 排除的文件
exclude = [
    ".git",
    ".venv",
    "__pycache__",
    "*.pyc",
    ".mypy_cache",
    ".pytest_cache",
    "migrations",
    "build",
    "dist",
]

# 每个文件的规则配置
per-file-ignores = {
    "__init__.py": ["F401"],  # 未使用的导入
    "tests/*.py": ["S101"],   # 测试中使用assert
}

# isort配置
[tool.ruff.isort]
known-first-party = ["app"]
section-order = ["future", "standard-library", "third-party", "first-party", "local-folder"]
