# isort配置文件
# import排序工具

[settings]
# 每行最大长度
profile = "black"
line_length = 100

# 多行导入的缩进
multi_line_output = 3
include_trailing_comma = true
force_grid_wrap = 0
use_parentheses = true
ensure_newline_before_comments = true

# 导入顺序
known_first_party = app
known_third_party = fastapi, pydantic, sqlalchemy, pytest

# 跳过的目录
skip = .venv,venv,env,migrations
