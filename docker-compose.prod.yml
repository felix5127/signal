version: '3.8'

services:
  # ============================================================
  # PostgreSQL 数据库
  # ============================================================
  db:
    image: pgvector/pgvector:pg16
    container_name: signal-db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-signal}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-signal_hunter}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-signal} -d ${POSTGRES_DB:-signal_hunter}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - signal-network

  # ============================================================
  # Redis 缓存
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: signal-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - signal-network

  # ============================================================
  # 后端 API 服务
  # ============================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: signal-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/data
      - ./config.yaml:/app/config.yaml:ro
    environment:
      # 数据库
      - DATABASE_URL=postgresql://${POSTGRES_USER:-signal}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-signal_hunter}
      # Redis
      - REDIS_URL=redis://redis:6379/0
      # API Keys
      - KIMI_API_KEY=${KIMI_API_KEY}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - TINGWU_API_KEY=${TINGWU_API_KEY}
      # Cloudflare R2
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
      - R2_ENDPOINT=${R2_ENDPOINT}
      - R2_BUCKET=${R2_BUCKET}
      - R2_PUBLIC_URL=${R2_PUBLIC_URL}
      # 监控
      - SENTRY_DSN=${SENTRY_DSN}
      - LANGCHAIN_TRACING_V2=${LANGCHAIN_TRACING_V2:-false}
      - LANGCHAIN_API_KEY=${LANGCHAIN_API_KEY}
      # 运行环境
      - ENVIRONMENT=production
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_FORMAT=json
      - PYTHONUNBUFFERED=1
    env_file:
      - .env
    command: >
      sh -c "
        python -c 'from app.database import init_db; init_db()' &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4
      "
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    networks:
      - signal-network

  # ============================================================
  # 前端服务
  # ============================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    container_name: signal-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://backend:8000}
      - NODE_ENV=production
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - signal-network

  # ============================================================
  # Nginx 反向代理 (可选)
  # ============================================================
  nginx:
    image: nginx:alpine
    container_name: signal-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    networks:
      - signal-network
    profiles:
      - with-nginx

# ============================================================
# 数据卷
# ============================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

# ============================================================
# 网络
# ============================================================
networks:
  signal-network:
    driver: bridge
